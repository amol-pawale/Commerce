name: PR Pipeline

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-format:
    name: 1. Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Verify .NET Format
        working-directory: ./Backend
        run: dotnet format --verify-no-changes

  build:
    name: 2. Build
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Build .NET
        working-directory: ./Backend
        run: dotnet build --configuration Release

  test:
    name: 3. Automated Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Test .NET
        working-directory: ./Backend
        run: dotnet test --configuration Release

  ai-review:
    name: 4. AI Code Review
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Execute Gemini AI Review
        uses: sshnaidm/gemini-code-review-action@v2
        with:
          gemini-key: ${{ secrets.GEMINIAI }}
          model: gemini-2.5-flash
